"$schema" = 'https://starship.rs/config-schema.json'

format = """
[î‚¶](fg:yellow bg:none)[ïŒ“ ](bg:yellow fg:black)[î‚°](fg:yellow bg:none)\
$conda\
$docker_context\
$directory\
$package\
$git_branch\
$git_status\
${custom.git_end}\
$cmd_duration\
$fill\
${custom.prog_ver_start}\
$python$nodejs$java$golang\
${custom.prog_ver_end}\
$line_break\
$character
"""

add_newline = true

[character]
success_symbol = "[â‌¯](fg:green)"
error_symbol = "[â‌¯](fg:red)"

[custom.prog_ver_start]
style = "fg:black bg:none"
symbol = "î‚¶"
detect_files = ["pyproject.toml", ".python-version"]


[custom.prog_ver_end]
style = "fg:black bg:none"
symbol = "î‚´"
detect_files = ["pyproject.toml", ".python-version"]

[cmd_duration]
style = "fg:blue bg:none"
format = "[îƒ—]($style)[ ï‰’ $duration](fg:black bg:blue)[î‚´]($style)"

[directory]
style = "fg:green bg:none"
format = "[îƒ—]($style)[ َ°‌° $path ](fg:black bg:green)[î‚°]($style)"
truncation_length = 1
# truncation_symbol = "â€¦/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "َ±”ک"
"Downloads" = "ï€™ "
"Music" = "ï€پ "
"Pictures" = "ï€¾ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ïœکï„ھ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ïœک " = " ïœکï„ھ "

[fill]
symbol = " "

[conda]
style = "fg:color5 bg:none"
format = "[îƒ—]($style)[ conda $environment ](fg:color0 bg:color5)[î‚°]($style)"

[docker_context]
style = "fg:color5 bg:none"
format = "[îƒ—]($style)[ docker $environment ](fg:color0 bg:color5)[î‚°]($style)"

[package]
style = "fg:black bg:none"
format = "[îƒ—]($style)[ $version ](fg:color0 bg:color4)[î‚°]($style)"

[git_branch]
symbol = "ïگک"
style = "fg:black bg:cyan"
format = '[îƒ—](fg:cyan bg:none)[ $symbol $branch ]($style)'

[git_status]
style = "fg:black bg:cyan"
format = '[$all_status$ahead_behind]($style)'
conflicted = "=$count "
untracked = "?$count "
modified = "!$count "
deleted = "âœک$count "
staged = "+$count "
renamed = "آ»$count "
stashed = "*$count "
ahead = "â‡،$count "
behind = "â‡£$count "
diverged = "â‡• â‡£$behind_count â‡،$ahead_count "

[custom.git_end]
style = "fg:cyan bg:none"
symbol = "î‚°"
format = "[$symbol]($style)"
when = "git status 2>/dev/null; echo \\$?"
require_repo = true

[python]
symbol = "îœ¼"
style = "fg:color0 bg:color4"
format = '[ [$symbol](fg:color7 bg:color4) $version ]($style)'

[golang]
symbol = "îک§"
style = "fg:color0 bg:color4"
format = '[ $symbol $version ]($style)'

[nodejs]
symbol = "َ°ژ™"
style = "fg:color0 bg:color4"
format = '[ $symbol $version ]($style)'

