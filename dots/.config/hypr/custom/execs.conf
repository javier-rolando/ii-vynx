# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec-once = gsettings set org.cinnamon.desktop.default-applications.terminal exec kitty 
exec-once = gsettings set org.gnome.desktop.wm.preferences button-layout ":"
# exec-once = hyprpm reload -n && hyprctl reload && /home/javier/scripts/configure_monitors.sh 1monitor
exec-once = steam -nochatui -nofriendsui -silent
# exec-once = [ workspace special:betterbird silent ] betterbird
exec-once = solaar -w hide
exec-once = /usr/bin/kdeconnectd
exec-once = kdeconnect-indicator
exec-once = fcitx5
exec-once = sleep 1 && setxkbmap latam
exec-once = hyprpm reload
