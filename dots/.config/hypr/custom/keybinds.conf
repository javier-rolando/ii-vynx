bind = Super, Backspace, layoutmsg, mfact exact 0.47142 # [hidden]
bind = Super+Alt, Backspace, layoutmsg, mfact exact 0.55 # [hidden]
bind = Ctrl+Super, Backspace, layoutmsg, mfact exact 0.3544 # [hidden]
bind = Super, Left, layoutmsg, orientationnext # [hidden]
