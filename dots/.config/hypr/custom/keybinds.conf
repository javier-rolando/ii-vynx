# See https://wiki.hyprland.org/Configuring/Binds/
#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above

bindd = Super, Apostrophe, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Toggle cheatsheet
$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
#$fileManager = nemo
#$menu = wofi --show drun
#$menu = agsv1 -t launcher
$browser = zen-browser

bind = $mainMod, Return, exec, $terminal # [hidden]
bind = $mainMod SHIFT, Return, exec, warp-terminal # [hidden]
bind = $mainMod, B, exec, $browser # [hidden]
bind = $mainMod, Q, killactive,  # [hidden]
bind = $mainMod CTRL, Q, exit,  # [hidden]
bind = $mainMod SHIFT, E, exec, $fileManager # [hidden]
bind = $mainMod, braceright, togglefloating,  # [hidden]
bind = Super, F, fullscreen, 0  # [hidden]
bind = Super+Alt, F, fullscreen, 1  # [hidden]
bind = Super+Shift, F, fullscreenstate, 0 1 # [hidden]
